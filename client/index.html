<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Decision Tree Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // GitHub Pages SPA 路由修复
      // wouter 路由库的 base 默认为 ""，部署在子路径 /decision-tree-editor/ 时
      // 需要在应用启动前将 URL 路径规范化，使 wouter 能正确匹配路由规则
      (function() {
        var base = '/decision-tree-editor';

        // 步骤 1：如果是从 404.html 跳转过来的，恢复原始路径
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', redirect);
        }

        // 步骤 2：将 URL 路径规范化（去掉 base 前缀），使 wouter 能正确匹配路由
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) {
          var newPath = path.slice(base.length) || '/';
          window.history.replaceState(
            window.history.state,
            '',
            newPath + window.location.search + window.location.hash
          );
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
